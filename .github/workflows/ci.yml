name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component rustfmt --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy (seaorm)
        run: cargo clippy --workspace --features full -- -D warnings

      - name: cargo clippy (diesel-async)
        run: cargo clippy --workspace --no-default-features --features diesel-full -- -D warnings

      - name: Biome lint
        run: bun run lint

      - name: TypeScript typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: yauth
          POSTGRES_PASSWORD: yauth
          POSTGRES_DB: yauth_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U yauth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        env:
          DATABASE_URL: postgres://yauth:yauth@localhost:5433/yauth_test
        run: cargo test --workspace --features full -- --skip diesel

  test-diesel:
    name: Test (diesel-async)
    runs-on: ubuntu-latest
    # No postgres service — integration tests use testcontainers (one fresh
    # container per test) so each test is fully isolated and runs in parallel.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: cargo check (diesel-full)
        run: cargo check --workspace --no-default-features --features diesel-full

      - name: cargo clippy (diesel-full)
        run: cargo clippy --workspace --no-default-features --features diesel-full -- -D warnings

      - name: Run tests (diesel-async)
        run: cargo test --workspace --no-default-features --features diesel-full

  pentest:
    name: Security Pentest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run pentest suite
        run: cargo test --package yauth --features full -- pentest --nocapture

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, test-diesel, pentest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build Rust crates
        run: cargo build --workspace --features full --release

      - name: Build TS packages
        run: bun run build
