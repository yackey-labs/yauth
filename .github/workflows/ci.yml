name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component rustfmt --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --features full,all-backends -- -D warnings

      - name: Verify sqlx offline cache is complete
        run: SQLX_OFFLINE=true cargo check --workspace --features full,all-backends

      - name: Biome lint
        run: bun run lint

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Check generated client is up to date
        run: bun run generate:check

      - name: Build TS packages
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: yauth
          POSTGRES_PASSWORD: yauth
          POSTGRES_DB: yauth_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U yauth -d yauth_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: yauth
          MYSQL_USER: yauth
          MYSQL_PASSWORD: yauth
          MYSQL_DATABASE: yauth_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -pyauth"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run unit tests
        env:
          SQLX_OFFLINE: "true"
        run: cargo test --workspace --features full,all-backends --lib

      - name: Run conformance tests (7 backends)
        env:
          SQLX_OFFLINE: "true"
          DATABASE_URL: postgres://yauth:yauth@127.0.0.1:5433/yauth_test
          MYSQL_DATABASE_URL: mysql://yauth:yauth@127.0.0.1:3307/yauth_test
          SQLITE_DATABASE_URL: ":memory:"
          SQLX_PG_DATABASE_URL: postgres://yauth:yauth@127.0.0.1:5433/yauth_test
          SQLX_MYSQL_DATABASE_URL: mysql://yauth:yauth@127.0.0.1:3307/yauth_test
          SQLX_SQLITE_DATABASE_URL: "sqlite::memory:"
        run: cargo test --workspace --features full,all-backends --test repo_conformance

      - name: Run conformance tests (diesel-libsql, tested separately)
        env:
          SQLX_OFFLINE: "true"
        run: cargo test --workspace --features full,diesel-libsql-backend,memory-backend --test repo_conformance

      - name: Run integration tests (parallel-safe)
        env:
          SQLX_OFFLINE: "true"
          DATABASE_URL: postgres://yauth:yauth@127.0.0.1:5433/yauth_test
          MYSQL_DATABASE_URL: mysql://yauth:yauth@127.0.0.1:3307/yauth_test
        run: cargo test --workspace --features full,all-backends --test diesel_integration --test diesel_mysql_integration --test pentest

      - name: Verify generated artifacts are fresh
        run: |
          cargo install --path crates/cargo-yauth
          cargo yauth -f yauth-diesel-pg.toml generate --check
          cargo yauth -f yauth-sqlx-pg.toml generate --check
          cargo yauth -f yauth-sqlx-mysql.toml generate --check
          cargo yauth -f yauth-sqlx-sqlite.toml generate --check
          cargo yauth -f yauth-toasty.toml generate --check

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, rust]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

