name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: arc-runner-set
    if: "!startsWith(github.event.head_commit.message, 'chore:')"
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install knope
        run: |
          curl -sSL "https://github.com/knope-dev/knope/releases/latest/download/knope-x86_64-unknown-linux-musl.tgz" | tar xz --strip-components=1
          mv knope /usr/local/bin/

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure npm registry
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
          echo "@yackey-labs:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.INFRA_DEPLOY_TOKEN }}
        run: knope release || echo "No unreleased changes"
