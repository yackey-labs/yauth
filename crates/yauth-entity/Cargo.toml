[package]
name = "yauth-entity"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Diesel entities for yauth — modular authentication for Axum"
keywords = ["axum", "authentication", "diesel", "webauthn", "totp"]
categories = ["authentication", "web-programming"]
publish = true

[features]
default = ["diesel-async", "email-password"]
diesel-async = ["dep:diesel", "dep:diesel-async-crate"]
email-password = []
passkey = []
mfa = []
oauth = []
bearer = []
api-key = []
magic-link = []
oauth2-server = []
account-lockout = []
webhooks = []
oidc = []
full = ["diesel-async", "email-password", "passkey", "mfa", "oauth", "bearer", "api-key", "magic-link", "oauth2-server", "account-lockout", "webhooks", "oidc"]

[dependencies]
diesel = { workspace = true, optional = true }
diesel-async-crate = { version = "0.5", features = ["postgres", "deadpool"], optional = true, package = "diesel-async" }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
