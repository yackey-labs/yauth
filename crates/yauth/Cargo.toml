[package]
name = "yauth"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = ["yauth"]

[features]
default = ["seaorm", "email-password"]
seaorm = ["dep:sea-orm", "dep:sea-orm-migration", "yauth-entity/seaorm", "yauth-migration/seaorm"]
diesel-async = ["dep:diesel", "dep:diesel-async-crate", "dep:futures-util", "yauth-entity/diesel-async", "yauth-migration/diesel-async"]
email-password = ["yauth-entity/email-password", "yauth-migration/email-password"]
passkey = ["yauth-entity/passkey", "yauth-migration/passkey", "dep:webauthn-rs", "dep:webauthn-rs-proto"]
mfa = ["yauth-entity/mfa", "yauth-migration/mfa", "dep:totp-rs"]
oauth = ["yauth-entity/oauth", "yauth-migration/oauth", "dep:oauth2"]
bearer = ["yauth-entity/bearer", "yauth-migration/bearer", "dep:jsonwebtoken"]
api-key = ["yauth-entity/api-key", "yauth-migration/api-key"]
magic-link = ["yauth-entity/magic-link", "yauth-migration/magic-link"]
admin = []
status = []
oauth2-server = ["yauth-entity/oauth2-server", "yauth-migration/oauth2-server", "dep:url", "dep:base64", "dep:serde_urlencoded"]
account-lockout = ["yauth-entity/account-lockout", "yauth-migration/account-lockout"]
webhooks = ["yauth-entity/webhooks", "yauth-migration/webhooks", "dep:hmac"]
oidc = ["bearer", "oauth2-server", "yauth-entity/oidc", "yauth-migration/oidc"]
telemetry = ["dep:tracing-opentelemetry", "dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:opentelemetry-semantic-conventions"]
full = ["seaorm", "email-password", "passkey", "mfa", "oauth", "bearer", "api-key", "magic-link", "admin", "status", "oauth2-server", "account-lockout", "webhooks", "oidc", "telemetry"]
diesel-full = ["diesel-async", "email-password", "passkey", "mfa", "oauth", "bearer", "api-key", "magic-link", "admin", "status", "oauth2-server", "account-lockout", "webhooks", "oidc", "telemetry"]

[dependencies]
yauth-entity = { workspace = true }
yauth-migration = { workspace = true }

axum = { workspace = true }
axum-extra = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

sea-orm = { workspace = true, optional = true }
sea-orm-migration = { workspace = true, optional = true }

# Diesel (optional alternative to SeaORM)
diesel = { workspace = true, optional = true }
diesel-async-crate = { version = "0.5", features = ["postgres", "deadpool"], optional = true, package = "diesel-async" }
futures-util = { version = "0.3", optional = true }

serde = { workspace = true }
serde_json = { workspace = true }

argon2 = { workspace = true }
password-hash = { workspace = true }
rand = { workspace = true }
hex = { workspace = true }
sha1 = { workspace = true }
sha2 = "0.10"
uuid = { workspace = true }
chrono = { workspace = true }

thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

lettre = { workspace = true }
reqwest = { workspace = true }

async-trait = { workspace = true }
ts-rs = { workspace = true }
axum-ts-client = { workspace = true }

# Feature-gated
webauthn-rs = { workspace = true, optional = true }
webauthn-rs-proto = { workspace = true, optional = true }
totp-rs = { workspace = true, optional = true }
oauth2 = { workspace = true, optional = true }
jsonwebtoken = { workspace = true, optional = true }

# Feature-gated: OAuth2 Server
url = { version = "2", optional = true }
base64 = { version = "0.22", optional = true }
serde_urlencoded = { version = "0.7", optional = true }

# Feature-gated: Webhooks
hmac = { version = "0.12", optional = true }

tracing-opentelemetry = { workspace = true, optional = true }
opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }

[dev-dependencies]
totp-rs = { workspace = true }
uuid = { workspace = true }
base64 = "0.22"
url = "2"

[[example]]
name = "server"
required-features = ["seaorm"]

[[example]]
name = "e2e_test"
required-features = ["seaorm"]
