[package]
versioned_files = [
    "Cargo.toml",
    { path = "Cargo.lock", dependency = "yauth" },
    "packages/shared/package.json",
    "packages/client/package.json",
    "packages/ui-solidjs/package.json",
    "packages/ui-vue/package.json",
    { path = "packages/client/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "packages/ui-solidjs/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "packages/ui-solidjs/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "packages/ui-vue/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "packages/ui-vue/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "examples/vue/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "examples/vue/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "examples/vue/package.json", dependency = "@yackey-labs/yauth-ui-vue" },
    { path = "examples/solidjs/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "examples/solidjs/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "examples/solidjs/package.json", dependency = "@yackey-labs/yauth-ui-solidjs" },
    { path = "examples/vue-redis/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "examples/vue-redis/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "examples/vue-redis/package.json", dependency = "@yackey-labs/yauth-ui-vue" },
    { path = "pentest/package.json", dependency = "@yackey-labs/yauth-client" },
]
changelog = "CHANGELOG.md"

[github]
owner = "yackey-labs"
repo = "yauth"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

# Reformat knope's 2-space JSON to match Biome tab convention
[[workflows.steps]]
type = "Command"
command = "bun biome format --write packages/shared/package.json packages/client/package.json packages/ui-solidjs/package.json packages/ui-vue/package.json"
shell = true

# Stage the reformatted files (PrepareRelease staged the 2-space originals)
[[workflows.steps]]
type = "Command"
command = "git add packages/shared/package.json packages/client/package.json packages/ui-solidjs/package.json packages/ui-vue/package.json"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: prepare release $version\""

# Build TS packages before publishing
[[workflows.steps]]
type = "Command"
command = "bun run build"
shell = true

# Publish Rust crate to crates.io
[[workflows.steps]]
type = "Command"
command = "cargo publish -p yauth"

# Publish npm packages to npmjs.com
[[workflows.steps]]
type = "Command"
command = "cd packages/shared && npm publish --access public --provenance"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/client && npm publish --access public --provenance"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/ui-solidjs && npm publish --access public --provenance"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/ui-vue && npm publish --access public --provenance"
shell = true

# Push and create release after all packages are published
[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"
