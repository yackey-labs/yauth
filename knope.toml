[package]
versioned_files = [
    "Cargo.toml",
    { path = "Cargo.lock", dependency = "yauth" },
    { path = "Cargo.lock", dependency = "yauth-migration" },
    { path = "Cargo.lock", dependency = "yauth-entity" },
    { path = "Cargo.lock", dependency = "cargo-yauth" },
    { path = "crates/yauth/Cargo.toml", dependency = "yauth-migration" },
    { path = "crates/yauth/Cargo.toml", dependency = "yauth-entity" },
    { path = "crates/cargo-yauth/Cargo.toml", dependency = "yauth-migration" },
    "packages/shared/package.json",
    "packages/client/package.json",
    "packages/ui-solidjs/package.json",
    "packages/ui-vue/package.json",
    { path = "packages/client/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "packages/ui-solidjs/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "packages/ui-solidjs/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "packages/ui-vue/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "packages/ui-vue/package.json", dependency = "@yackey-labs/yauth-shared" },
]
# Note: examples/ and pentest/ use workspace resolution for yauth deps.
# Their package.json versions are pinned but don't need auto-bumping —
# bun resolves them from the workspace, not npm.
changelog = "CHANGELOG.md"

[github]
owner = "yackey-labs"
repo = "yauth"

# ── Step 1: Prepare a release PR ──────────────────────────────────────────
# Runs on every push to main. Bumps versions, updates CHANGELOG,
# regenerates artifacts, and creates/updates a "release" PR.
[[workflows]]
name = "prepare-release"

# Create a release branch from main
[[workflows.steps]]
type = "Command"
command = "git switch -c release"

[[workflows.steps]]
type = "PrepareRelease"

# Regenerate OpenAPI spec + TS client (version field comes from Cargo.toml)
[[workflows.steps]]
type = "Command"
command = "bun generate"
shell = true

# Reformat knope's 2-space JSON to match Biome tab convention
[[workflows.steps]]
type = "Command"
command = "bun biome format --write packages/shared/package.json packages/client/package.json packages/ui-solidjs/package.json packages/ui-vue/package.json"
shell = true

# Stage regenerated files and commit
[[workflows.steps]]
type = "Command"
command = "git add packages/shared/package.json packages/client/package.json packages/ui-solidjs/package.json packages/ui-vue/package.json openapi.json packages/client/src/generated.ts packages/client/src/generated.msw.ts"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: prepare release $version\" --allow-empty"

# Push release branch and create PR
[[workflows.steps]]
type = "Command"
command = "git push --force --set-upstream origin release"

[[workflows.steps]]
type = "CreatePullRequest"
base = "main"

[workflows.steps.title]
template = "chore: release $version"

[workflows.steps.body]
template = """## Release $version

$changelog

---
Merging this PR will publish to crates.io and npm.
"""

# ── Step 2: Publish and tag ───────────────────────────────────────────────
# Runs when the release PR is merged. Publishes crates + npm packages,
# then creates the GitHub release with tag.
[[workflows]]
name = "release"

# Build TS packages before publishing
[[workflows.steps]]
type = "Command"
command = "bun run build"
shell = true

# Publish Rust crates to crates.io (dependency order: yauth-migration -> yauth-entity -> yauth -> cargo-yauth)
[[workflows.steps]]
type = "Command"
command = "cargo publish -p yauth-migration"

[[workflows.steps]]
type = "Command"
command = "cargo publish -p yauth-entity"

[[workflows.steps]]
type = "Command"
command = "cargo publish -p yauth"

[[workflows.steps]]
type = "Command"
command = "cargo publish -p cargo-yauth"

# Publish npm packages to npmjs.com
[[workflows.steps]]
type = "Command"
command = "cd packages/shared && npm publish --access public --provenance"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/client && npm publish --access public --provenance"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/ui-solidjs && npm publish --access public --provenance"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/ui-vue && npm publish --access public --provenance"
shell = true

# Create GitHub release + tag
[[workflows.steps]]
type = "Release"
