[package]
versioned_files = [
    "Cargo.toml",
    { path = "Cargo.lock", dependency = "yauth" },
    { path = "Cargo.lock", dependency = "yauth-entity" },
    { path = "Cargo.lock", dependency = "yauth-migration" },
    "packages/shared/package.json",
    "packages/client/package.json",
    "packages/ui-solidjs/package.json",
    { path = "packages/client/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "packages/ui-solidjs/package.json", dependency = "@yackey-labs/yauth-client" },
    { path = "packages/ui-solidjs/package.json", dependency = "@yackey-labs/yauth-shared" },
    { path = "Cargo.toml", dependency = "yauth-entity" },
    { path = "Cargo.toml", dependency = "yauth-migration" },
]
changelog = "CHANGELOG.md"

[github]
owner = "yackey-labs"
repo = "yauth"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

# Reformat knope's 2-space JSON to match Biome tab convention
[[workflows.steps]]
type = "Command"
command = "bun biome format --write packages/shared/package.json packages/client/package.json packages/ui-solidjs/package.json"
shell = true

# Stage the reformatted files (PrepareRelease staged the 2-space originals)
[[workflows.steps]]
type = "Command"
command = "git add packages/shared/package.json packages/client/package.json packages/ui-solidjs/package.json"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: prepare release $version\""

# Build TS packages before publishing
[[workflows.steps]]
type = "Command"
command = "bun run build"
shell = true

# Publish npm packages (GitHub Packages)
[[workflows.steps]]
type = "Command"
command = "cd packages/shared && bun publish --access public"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/client && bun publish --access public"
shell = true

[[workflows.steps]]
type = "Command"
command = "cd packages/ui-solidjs && bun publish --access public"
shell = true

# Push and create release after all packages are published
[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"
