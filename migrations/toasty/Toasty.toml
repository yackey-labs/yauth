# Toasty migration configuration — generated by cargo-yauth.
# Safe to edit by hand once committed.

[migration]
# Migration artifacts live here relative to the crate root.
path = "toasty"
# Sequential numeric prefix: 0000_, 0001_, 0002_, ...
# Chosen over timestamps for deterministic ordering in embedded builds.
prefix_style = "Sequential"
# Insert `-- #[toasty::breakpoint]` comments between DDL statements so
# the applier can split multi-statement files per driver (SQLite only
# accepts one statement per execute()).
statement_breakpoints = true
# SHA-256 checksum stored per migration so accidental edits to
# already-applied files fail fast at apply time.
checksums = true

[schema]
# All yauth tables wear the same prefix as other backends.
table_name_prefix = "yauth_"
