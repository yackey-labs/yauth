[migration]
orm = "diesel"
dialect = "postgres"
table_prefix = "yauth_"
migrations_dir = "migrations/diesel-pg"

[plugins]
enabled = [
    "email-password",
    "passkey",
    "mfa",
    "oauth",
    "bearer",
    "api-key",
    "magic-link",
    "admin",
    "oauth2-server",
    "account-lockout",
    "webhooks",
    "oidc",
]
